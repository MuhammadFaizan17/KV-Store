services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secretlab-kvstore
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=secretlab_kvstore
      - DB_USERNAME=secretlab_user
      - DB_PASSWORD=secret
    depends_on:
      mysql:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    command: php artisan serve --host=0.0.0.0

  liquibase:
    build:
      context: .
      dockerfile: Dockerfile.liquibase
    container_name: secretlab-liquibase
    volumes:
      - .:/workspace
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - --search-path=/workspace
      - --classpath=/liquibase/lib/mysql-connector-j-8.4.0.jar
      - --driver=com.mysql.cj.jdbc.Driver
      - --url=jdbc:mysql://mysql:3306/secretlab_kvstore
      - --username=secretlab_user
      - --password=secret
      - --changelog-file=liquibase/changelog/db.changelog.xml
      - update
    restart: "no"

  mysql:
    image: mysql:8.0
    container_name: secretlab-mysql
    environment:
      MYSQL_DATABASE: secretlab_kvstore
      MYSQL_USER: secretlab_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mysql_data:
